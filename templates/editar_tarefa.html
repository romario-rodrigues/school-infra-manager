{% extends 'base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="fas fa-edit me-2"></i>Editar Detalhes da Tarefa</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label font-weight-bold">Descrição/Título</label>
                        <input type="text" name="titulo" class="form-control" value="{{ tarefa.titulo }}" required>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label font-weight-bold">Prioridade</label>
                        <select name="prioridade" class="form-select">
                            <option value="Baixa" {% if tarefa.prioridade == 'Baixa' %}selected{% endif %}>Baixa</option>
                            <option value="Media" {% if tarefa.prioridade == 'Media' %}selected{% endif %}>Média</option>
                            <option value="Alta" {% if tarefa.prioridade == 'Alta' %}selected{% endif %}>Alta</option>
                            <option value="Critica" {% if tarefa.prioridade == 'Critica' %}selected{% endif %}>Crítica</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label font-weight-bold">Relato Técnico / Observações</label>
                    <textarea name="descricao_detalhada" class="form-control" rows="6" 
                              placeholder="Descreva aqui o diagnóstico ou o que foi feito...">{{ tarefa.descricao_detalhada|default_if_none:"" }}</textarea>
                </div>

                <div class="d-flex justify-content-between border-top pt-3">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fas fa-save me-1"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
