{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infra Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="{% static 'css/imprimir.css' %}" media="print">
    <style>
        body { background-color: #f4f6f9; overflow-x: hidden; }
        #sidebar-wrapper { min-height: 100vh; width: 250px; background-color: #2c3e50; }
        .sidebar-heading { background-color: #1a252f; padding: 20px; text-align: center; font-weight: bold; color: #fff; }
        .list-group-item { background-color: transparent !important; color: #bdc3c7 !important; border: none; padding: 15px 25px; }
        .list-group-item:hover { color: #fff !important; background-color: #34495e !important; }
        .top-navbar { background-color: #fff; border-bottom: 1px solid #dee2e6; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-heading"><i class="fas fa-server me-2"></i> INFRA MANAGER</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>
                <a href="{% url 'lista_estoque' %}" class="list-group-item list-group-item-action">
                    <i class="fas fa-box me-2"></i> Estoque
                </a>
                <div class="mt-5 p-3">
                    <form action="{% url 'admin:logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">Sair</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="top-navbar d-flex justify-content-between align-items-center shadow-sm">
                <h5 class="mb-0 text-muted small fw-bold text-uppercase">Painel de Controle - Optimus</h5>
                <div class="small">Usuário: <strong>{{ user.username }}</strong></div>
            </nav>

            {% block content %}
            {% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
