{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Infra Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="{% static 'css/imprimir.css' %}" media="print">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f6f9; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #sidebar-wrapper { min-height: 100vh; width: 250px; background-color: #1a252f; }
        .sidebar-heading { background-color: #0d1b2a; padding: 20px; text-align: center; font-weight: bold; color: #fff; font-size: 1.1rem; letter-spacing: 1px; }
        .list-group-item { background-color: transparent !important; color: #bdc3c7 !important; border: none; padding: 15px 25px; font-size: 0.9rem; }
        .list-group-item:hover { color: #fff !important; background-color: #2c3e50 !important; }
        .list-group-item i { width: 20px; text-align: center; margin-right: 10px; }
        .top-navbar { background-color: #fff; border-bottom: 1px solid #dee2e6; padding: 10px 20px; }
        .card { border-radius: 8px; }
        .btn { border-radius: 6px; }
        .badge { font-size: 0.75rem; padding: 0.35em 0.65em; }
        .table th { font-weight: 600; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-heading"><i class="fas fa-school me-2"></i> SCHOOL INFRA</div>
            <div class="list-group list-group-flush">
                <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="{% url 'lista_estoque' %}" class="list-group-item list-group-item-action">
                    <i class="fas fa-boxes"></i> Estoque
                </a>
                <a href="{% url 'os_list' %}" class="list-group-item list-group-item-action">
                    <i class="fas fa-clipboard-list"></i> Ordens de Serviço
                </a>
                <div class="mt-5 p-3">
                    <form action="{% url 'admin:logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100"><i class="fas fa-sign-out-alt me-1"></i> Sair</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="top-navbar d-flex justify-content-between align-items-center shadow-sm">
                <h5 class="mb-0 text-muted small fw-bold text-uppercase"><i class="fas fa-cogs me-2"></i>Painel de Controle</h5>
                <div class="small"><i class="fas fa-user me-1"></i>{{ user.username }}</div>
            </nav>

            {% block content %}
            {% endblock %}
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
