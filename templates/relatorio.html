<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Estoque</title>
    <link rel="stylesheet" href="{% static 'css/imprimir.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="window.print()"> <div class="main-page">
        <div class="sub-page">
            <header class="mb-4">
                <h4 class="text-center">Relatório de Estoque - Escola Inovação</h4>
                <p class="text-center small">Gerado em: {{ data_hoje }}</p>
            </header>

            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Item</th>
                        <th>Categoria</th>
                        <th>Qtd Atual</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in itens %}
                    <tr>
                        <td>{{ item.nome }}</td>
                        <td>{{ item.categoria.nome }}</td>
                        <td>{{ item.quantidade_atual }} {{ item.unidade_medida }}</td>
                        <td>{% if item.precisa_repor %}CRÍTICO{% else %}OK{% endif %}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
