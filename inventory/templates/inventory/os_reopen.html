{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5><i class="fas fa-undo me-2"></i>Reabrir Ordem de Serviço #{{ ordem.id }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label for="{{ form.comentario.id_for_label }}" class="form-label">Comentário (opcional)</label>
                        {{ form.comentario }}
                    </div>
                </div>
                <div class="mt-4 d-flex justify-content-end">
                    <a href="{% url 'os_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-secondary"><i class="fas fa-undo me-1"></i> Reabrir</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
