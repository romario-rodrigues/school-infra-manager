{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5><i class="fas fa-check-circle me-2"></i>Finalizar Ordem de Serviço #{{ ordem.id }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label for="{{ form.laudo_tecnico.id_for_label }}" class="form-label">Laudo Técnico</label>
                        {{ form.laudo_tecnico }}
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            {{ form.entregue }}
                            <label class="form-check-label" for="{{ form.entregue.id_for_label }}">
                                Entregue ao Setor?
                            </label>
                        </div>
                    </div>
                </div>
                <div class="mt-4 d-flex justify-content-end">
                    <a href="{% url 'os_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success"><i class="fas fa-check me-1"></i> Finalizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
