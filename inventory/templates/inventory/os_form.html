{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5><i class="fas fa-plus-circle me-2"></i>Nova Ordem de Serviço</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="{{ form.setor.id_for_label }}" class="form-label">Setor</label>
                        {{ form.setor }}
                    </div>
                    <div class="col-md-4">
                        <label for="{{ form.solicitante.id_for_label }}" class="form-label">Solicitante</label>
                        {{ form.solicitante }}
                    </div>
                    <div class="col-md-4">
                        <label for="{{ form.marca.id_for_label }}" class="form-label">Marca</label>
                        {{ form.marca }}
                    </div>
                    <div class="col-md-4">
                        <label for="{{ form.modelo.id_for_label }}" class="form-label">Modelo</label>
                        {{ form.modelo }}
                    </div>
                    <div class="col-md-4">
                        <label for="{{ form.numero_serie.id_for_label }}" class="form-label">Nº Série</label>
                        {{ form.numero_serie }}
                    </div>
                    <div class="col-md-4">
                        <label for="{{ form.valor.id_for_label }}" class="form-label">Valor</label>
                        {{ form.valor }}
                    </div>
                    <div class="col-12">
                        <label for="{{ form.defeito.id_for_label }}" class="form-label">Defeito</label>
                        {{ form.defeito }}
                    </div>
                    <div class="col-12">
                        <label for="{{ form.laudo.id_for_label }}" class="form-label">Laudo</label>
                        {{ form.laudo }}
                    </div>
                    <div class="col-12">
                        <label for="{{ form.itens.id_for_label }}" class="form-label">Itens Utilizados</label>
                        {{ form.itens }}
                    </div>
                </div>
                <div class="mt-4 d-flex justify-content-end">
                    <a href="{% url 'os_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
